name: Repository Security Scan
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Repository Security Scanner
        id: scan
        run: |
          python scanner.py . --json --output security-report.json
          if grep -q "CRITICAL" security-report.json; then
            echo "critical_threats=true" >> $GITHUB_OUTPUT
          else
            echo "critical_threats=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate HTML Report
        run: |
          python scanner.py . --html --output security-report.html

      - name: Upload Security Report (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-json
          path: security-report.json

      - name: Upload Security Report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-html
          path: security-report.html

      - name: Security Scan Completed
        run: |
          echo "Security scan completed successfully"

  scan-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: security-scan
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install flake8 pylint

      - name: Lint Python code
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Check code complexity
        run: |
          pylint scanner.py threat_patterns.py report_generator.py --fail-under=7.0 || true

  report:
    name: Generate Report Summary
    runs-on: ubuntu-latest
    needs: [security-scan, scan-quality]
    if: always()
    steps:
      - name: Create workflow summary
        run: |
          echo "# Security Scan Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Workflow completed successfully." >> $GITHUB_STEP_SUMMARY
